<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — PROMPT UP</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="logo" style="justify-content:center;margin-bottom:24px;">
                <div class="logo-icon"></div>
                <span class="wordmark">PROMPT UP</span>
            </div>
            <h1>Вход</h1>
            <p class="subtitle">Войди в свой аккаунт, чтобы продолжить обучение</p>
            <div id="error-msg" class="alert alert-error" style="display:none;"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" class="input-field" placeholder="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" class="input-field" placeholder="Пароль" required>
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
            <div class="switch-link">
                Нет аккаунта? <a href="/">Зарегистрироваться</a>
            </div>
        </div>
    </div>
    <script>
        const API = '/api';
        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorMsg.textContent = data.detail || 'Ошибка входа';
                    errorMsg.style.display = 'block';
                    return;
                }
                localStorage.setItem('token', data.access_token);
                window.location.href = '/dashboard';
            } catch (err) {
                errorMsg.textContent = 'Ошибка подключения к серверу';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
