<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT UP — Вход</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="logo" style="justify-content: center; margin-bottom: 24px;">
                <span class="wordmark-prompt" style="font-size: 26px; font-weight: 600;">PROMPT</span>
                <span class="wordmark-up" style="font-size: 26px; font-weight: 800; color: #FFC800;">UP</span>
            </div>
            <h1>Авторизация</h1>
            <p class="subtitle">Войди в свой аккаунт, чтобы продолжить обучение</p>
            <div id="error-msg" class="alert alert-error" style="display:none;"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" class="input-field" placeholder="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" class="input-field" placeholder="Пароль" required>
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
            <div class="switch-link">
                Нет аккаунта? <a href="/register">Зарегистрироваться</a>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
