<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPT UP — Регистрация</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="logo" style="justify-content: center; margin-bottom: 24px;">
                <span class="wordmark-prompt" style="font-size: 26px; font-weight: 600;">PROMPT</span>
                <span class="wordmark-up" style="font-size: 26px; font-weight: 800; color: #FFC800;">UP</span>
            </div>
            <h1>Добро пожаловать!</h1>
            <p class="subtitle">Начни обучение промпт-инжинирингу прямо сейчас</p>
            <div id="error-msg" class="alert alert-error" style="display:none;"></div>
            <form id="register-form">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" class="input-field" placeholder="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="input-field" placeholder="user@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" class="input-field" placeholder="Минимум 6 символов" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            </form>
            <div class="switch-link">
                Уже есть аккаунт? <a href="/login">Войти</a>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
