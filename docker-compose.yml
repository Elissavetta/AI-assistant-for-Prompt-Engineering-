services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
