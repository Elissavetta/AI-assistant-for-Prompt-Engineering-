services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-qwen-medium}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.ai.beeline.ru/api/v3}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
